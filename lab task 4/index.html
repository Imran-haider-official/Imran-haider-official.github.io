<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Toggle</title>
    <link rel="stylesheet" href="./css/main.css">
    <style>
        /* Add this to your main.css or here to hide them initially */
        #image { display: none; width: 300px; } 
        #hideimage { display: none; }
    </style>
</head>
<body>

    <img id="image" class="image" src="./images/eduard-pretsi-nKPRWaWzcwA-unsplash.jpg" alt="Unsplash Image">

    <br>

    <button id="showimage">Show Image</button>
    <button id="hideimage" class="btn">Hide Image</button>

    <script src="./main.js"></script>
</body>
</html>
